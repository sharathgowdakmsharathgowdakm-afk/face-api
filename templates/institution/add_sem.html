{% extends "base.html" %}
{% block title %}Add Semester - Smart Attendance{% endblock %}
{% block navbar_title %}Add Semester{% endblock %}
{% block content %}
<div class="page-title">Add New Semester</div>
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><i class="fas fa-plus"></i> Add Semester</div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label class="form-label">Semester Name</label>
                        <input type="text" name="sem_name" class="form-control" required placeholder="e.g. 1st Semester, 2nd Semester">
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Semester</button>
                    <a href="/institution/dashboard?course_id={{ course_id }}&branch={{ branch }}&year={{ year }}" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
